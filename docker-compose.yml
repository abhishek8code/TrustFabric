version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: trustfabric
      POSTGRES_PASSWORD: trustfabric
      POSTGRES_DB: trustfabric
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  backend:
    build: ./backend
    ports: ["8000:8000"]
    env_file: .env
    depends_on: [db, redis]
    volumes:
      - ./backend:/app
      - ./data:/data
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    depends_on: [backend]
    volumes: ["./frontend/src:/app/src"]

volumes:
  pgdata:
